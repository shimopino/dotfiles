###########################
### MacOS 関連のツール ###
###########################
# mise plugin install xcode https://github.com/qasim/mise-xcode
# Xcode 26.5 を指定
# xcode = "26.5"

# 必要に応じてSwift関連ツールも一緒に管理
# swiftlint = "0.58.0" # 最新安定版を確認して調整
# swiftformat = "0.56.0"
# "spm:swiftlang/swift-format" = "latest"   # SPMツールも可

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[settings.github]
credential_command = "gh auth token"
github_attestations = false


[tasks.worktree-create]
description = "Interactively create a managed git worktree under .worktrees and open it in Zed"
run = "bash ~/.config/mise/scripts/worktree-create-interactive.sh"
interactive = true

[tasks.worktree-open]
description = "Interactively select a managed git worktree under .worktrees and open it in Zed"
run = "bash ~/.config/mise/scripts/worktree-open-interactive.sh"
interactive = true

[tasks.worktree-remove]
description = "Interactively remove a managed git worktree under .worktrees"
run = "bash ~/.config/mise/scripts/worktree-remove-interactive.sh"
interactive = true
